<h1>Mission Control Center</h1>
<div class="container">
<app-hero-card 
class="card-list"

*ngFor="let h of heroes"
[hero]="h"
(onMissionDone)="markAsDone($event)"
(onHeroModified)="heroSelezionato($event)"
>
</app-hero-card>
</div>
<p>Missioni completate: {{ totalCompleted }}</p>

<app-hero-edit 
[hero]="heroSelected"
(onSalva)="aggiungiHero($event)">
</app-hero-edit>
