<div class="card" [style.background-color]="hero.completata ? 'lightgreen'
: 'white'">
<h3>{{ hero.nome }}</h3>
<p>Potere: {{ hero.potere }}</p>
<button 
class="{{ hero.completata ? 'nuova-missione' : 'missione-completata' }}"
(click)="notifyParent()"
>
{{ hero.completata ? 'Nuova missione' : 'Missione completata' }}
</button>
<br>
<button 
class="modifica"
(click)="modificaHero()">
    modifica
</button>
</div>
